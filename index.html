<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon TCG Pack Simulator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .results-section {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .result-item {
            padding: 8px 0;
            border-bottom: 1px solid #dee2e6;
        }
        .result-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="card shadow">
            <div class="card-body">
                <h1 class="card-title text-center mb-4">Pokemon TCG Pack Simulator</h1>
                
                <div class="row g-3 align-items-end mb-4">
                    <div class="col-md-5">
                        <label for="packType" class="form-label">Pack Type</label>
                        <select id="packType" class="form-select">
                            <option value="a1_pikachu">A1 Pikachu</option>
                            <option value="a1_mewtwo">A1 Mewtwo</option>
                            <option value="a1_charizard">A1 Charizard</option>
                            <option value="a1a">A1A Mew</option>
                            <option value="a2_diagla">A2 Diagla</option>
                            <option value="a2_palkia">A2 Palkia</option>
                            <option value="a2a">A2A</option>
                            <option value="a2b">A2B</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="packCount" class="form-label">Number of Packs</label>
                        <input type="number" id="packCount" class="form-control" min="1" max="10000" value="100">
                    </div>
                    <div class="col-md-3">
                        <button id="simulateBtn" class="btn btn-primary w-100">Simulate Packs</button>
                    </div>
                </div>

                <div id="error" class="alert alert-danger d-none">
                    Please enter a number between 1 and 10,000
                </div>

                <div id="results" class="results-section">
                    <h2 class="h4 mb-4">Results</h2>
                    
                    <div class="mb-4">
                        <h3 class="h5 mb-3">Pack Distribution</h3>
                        <div id="packResults"></div>
                    </div>

                    <div>
                        <h3 class="h5 mb-3">Card Distribution</h3>
                        <div id="rarityResults"></div>
                        <div id="totalCards" class="mt-3 fw-bold"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery and Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module">
        import { RARITIES, PACK_RATES, PACK_CARD_COUNTS, DRAW_RATES } from './data.js';

        $(document).ready(function() {
            $('#simulateBtn').on('click', function() {
                const packType = $('#packType').val();
                const packCount = parseInt($('#packCount').val());
                const $error = $('#error');
                const $results = $('#results');

                // Validate input
                if (isNaN(packCount) || packCount < 1 || packCount > 10000) {
                    $error.removeClass('d-none');
                    return;
                }
                $error.addClass('d-none');

                const drawRates = DRAW_RATES[packType];
                const results = new Array(RARITIES.length).fill(0);
                let regularPacks = 0;
                let rarePacks = 0;
                
                // Simulate packs
                for (let pack = 0; pack < packCount; pack++) {
                    const isRarePack = Math.random() > PACK_RATES[0];
                    isRarePack ? rarePacks++ : regularPacks++;
                    
                    const rateTable = isRarePack ? drawRates.rare : drawRates.regular;
                    
                    // Process each card position
                    rateTable.forEach(rates => {
                        const random = Math.random();
                        let cumulative = 0;
                        
                        for (let i = 0; i < rates.length; i++) {
                            cumulative += rates[i];
                            if (random <= cumulative) {
                                results[i]++;
                                break;
                            }
                        }
                    });
                }

                // Display pack distribution
                $('#packResults').html(`
                    <div class="result-item d-flex justify-content-between">
                        <span>Regular Packs:</span>
                        <span>${regularPacks}</span>
                    </div>
                    <div class="result-item d-flex justify-content-between">
                        <span>Rare Packs:</span>
                        <span>${rarePacks}</span>
                    </div>
                `);

                // Display card distribution
                let totalCards = 0;
                const rarityHtml = results.map((count, index) => {
                    if (count > 0) {
                        totalCards += count;
                        return `
                            <div class="result-item d-flex justify-content-between">
                                <span>Rarity ${RARITIES[index]}:</span>
                                <span>${count} cards</span>
                            </div>
                        `;
                    }
                    return '';
                }).join('');

                $('#rarityResults').html(rarityHtml);
                $('#totalCards').text(`Total Cards: ${totalCards}`);
            });
        });
    </script>
</body>
</html>
