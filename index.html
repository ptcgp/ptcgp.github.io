<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon TCG Pack Simulator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .results-section {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .result-item {
            padding: 8px 0;
            border-bottom: 1px solid #dee2e6;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        #collectionChart {
            height: 500px !important;
            max-height: 500px;
        }
        .loading {
            position: relative;
            min-height: 200px;
        }
        .loading::after {
            content: attr(data-progress);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2em;
            color: #6c757d;
        }
        .progress {
            display: none;
        }
        .loading .progress {
            display: block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="card shadow">
            <div class="card-body">
                <h1 class="card-title text-center mb-4">Pokemon TCG Pack Simulator</h1>
                
                <ul class="nav nav-tabs mb-4" id="simTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="pack-tab" data-bs-toggle="tab" data-bs-target="#pack" type="button" role="tab">
                            Pack Simulator
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="collection-tab" data-bs-toggle="tab" data-bs-target="#collection" type="button" role="tab">
                            Collection Simulator
                        </button>
                    </li>
                </ul>

                <div class="tab-content" id="simTabsContent">
                    <!-- Pack Simulator Tab -->
                    <div class="tab-pane fade show active" id="pack" role="tabpanel">
                        <div class="row g-3 align-items-end mb-4">
                            <div class="col-md-5">
                                <label for="packType" class="form-label">Pack Type</label>
                                <select id="packType" class="form-select">
                                    <option value="a1_pikachu">A1 Pikachu</option>
                                    <option value="a1_mewtwo">A1 Mewtwo</option>
                                    <option value="a1_charizard">A1 Charizard</option>
                                    <option value="a1a">A1A Mew</option>
                                    <option value="a2_diagla">A2 Diagla</option>
                                    <option value="a2_palkia">A2 Palkia</option>
                                    <option value="a2a">A2A</option>
                                    <option value="a2b">A2B</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="packCount" class="form-label">Number of Packs</label>
                                <input type="number" id="packCount" class="form-control" min="1" max="100000" value="100">
                            </div>
                            <div class="col-md-3">
                                <button id="simulateBtn" class="btn btn-primary w-100">Simulate Packs</button>
                            </div>
                        </div>

                        <div id="error" class="alert alert-danger d-none">
                            Please enter a number between 1 and 100,000
                        </div>

                        <div id="results" class="results-section">
                            <h2 class="h4 mb-4">Results</h2>
                            
                            <div class="mb-4">
                                <h3 class="h5 mb-3">Pack Distribution</h3>
                                <div id="packResults"></div>
                            </div>

                            <div>
                                <h3 class="h5 mb-3">Card Distribution</h3>
                                <div id="rarityResults"></div>
                                <div id="totalCards" class="mt-3 fw-bold"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Collection Simulator Tab -->
                    <div class="tab-pane fade" id="collection" role="tabpanel">
                        <div class="row g-3 align-items-end mb-4">
                            <div class="col-md-9">
                                <label for="collectionPackType" class="form-label">Pack Type</label>
                                <select id="collectionPackType" class="form-select">
                                    <option value="a1_pikachu">A1 Pikachu</option>
                                    <option value="a1_mewtwo">A1 Mewtwo</option>
                                    <option value="a1_charizard">A1 Charizard</option>
                                    <option value="a1a">A1A Mew</option>
                                    <option value="a2_diagla">A2 Diagla</option>
                                    <option value="a2_palkia">A2 Palkia</option>
                                    <option value="a2a">A2A</option>
                                    <option value="a2b">A2B</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <button id="simulateCollectionBtn" class="btn btn-primary w-100">Simulate</button>
                            </div>
                        </div>

                        <div class="results-section">
                            <h2 class="h4 mb-4">Collection Completion Results (10000 trials)</h2>
                            <div id="chartContainer" style="height: 500px;">
                                <div class="progress">
                                    <div class="progress-bar" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                                <canvas id="collectionChart"></canvas>
                            </div>
                            <div id="collectionStats" class="mt-4">
                                <div class="row">
                                    <div class="col-md-4">
                                        <div class="card">
                                            <div class="card-body">
                                                <h5 class="card-title">Average Packs</h5>
                                                <p id="avgPacks" class="card-text h3">-</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="card">
                                            <div class="card-body">
                                                <h5 class="card-title">Minimum Packs</h5>
                                                <p id="minPacks" class="card-text h3">-</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="card">
                                            <div class="card-body">
                                                <h5 class="card-title">Maximum Packs</h5>
                                                <p id="maxPacks" class="card-text h3">-</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery, Bootstrap, and Chart.js -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { RARITIES, PACK_RATES, PACK_CARD_COUNTS, DRAW_RATES } from './data.js';

        let collectionChart = null;

        function simulatePackOpening(packType, isRarePack) {
            const drawRates = DRAW_RATES[packType];
            const rateTable = isRarePack ? drawRates.rare : drawRates.regular;
            const results = new Array(RARITIES.length).fill(0);

            rateTable.forEach(rates => {
                const random = Math.random();
                let cumulative = 0;
                
                for (let i = 0; i < rates.length; i++) {
                    cumulative += rates[i];
                    if (random <= cumulative) {
                        results[i]++;
                        break;
                    }
                }
            });

            return results;
        }

        function simulateCollection(packType) {
            const cardCounts = PACK_CARD_COUNTS[packType];
            const collection = new Array(RARITIES.length).fill(0);
            let packCount = 0;

            while (!isCollectionComplete(collection, cardCounts)) {
                packCount++;
                const isRarePack = Math.random() > PACK_RATES[0];
                const packResults = simulatePackOpening(packType, isRarePack);
                
                for (let i = 0; i < collection.length; i++) {
                    collection[i] = Math.min(collection[i] + packResults[i], cardCounts[i] || 0);
                }
            }

            return packCount;
        }

        function isCollectionComplete(collection, targetCounts) {
            return collection.every((count, index) => {
                const target = targetCounts[index] || 0;
                return target === 0 || count >= target;
            });
        }

        function updateChart(data) {
            const ctx = document.getElementById('collectionChart').getContext('2d');
            
            if (collectionChart) {
                collectionChart.destroy();
            }

            const binSize = 10;
            const bins = {};
            const maxPacks = Math.max(...data);
            
            // Initialize bins
            for (let i = 0; i <= maxPacks; i += binSize) {
                bins[i] = 0;
            }

            // Count trials in each bin
            data.forEach(value => {
                const bin = Math.floor(value / binSize) * binSize;
                bins[bin] = (bins[bin] || 0) + 1;
            });

            // Convert to cumulative distribution
            const sortedBins = Object.keys(bins).sort((a, b) => Number(a) - Number(b));
            const cumulativeData = [];
            let cumulative = 0;
            const totalTrials = data.length;

            sortedBins.forEach(bin => {
                cumulative += bins[bin];
                // Convert to percentage
                const percentage = (cumulative / totalTrials) * 100;
                cumulativeData.push({
                    x: Number(bin),
                    y: percentage
                });
            });

            collectionChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Cumulative Completion Rate (%)',
                        data: cumulativeData,
                        borderColor: 'rgba(54, 162, 235, 1)',
                        backgroundColor: 'rgba(54, 162, 235, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            title: {
                                display: true,
                                text: 'Percentage of Trials Completed (%)'
                            }
                        },
                        x: {
                            type: 'linear',
                            title: {
                                display: true,
                                text: 'Number of Packs Needed'
                            }
                        }
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: 'Cumulative Probability of Completing Collection'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.parsed.y.toFixed(1)}% completed within ${context.parsed.x} packs`;
                                }
                            }
                        }
                    }
                }
            });
        }

        $(document).ready(function() {
            // Pack Simulator
            $('#simulateBtn').on('click', function() {
                const packType = $('#packType').val();
                const packCount = parseInt($('#packCount').val());
                const $error = $('#error');

                if (isNaN(packCount) || packCount < 1 || packCount > 100000) {
                    $error.removeClass('d-none');
                    return;
                }
                $error.addClass('d-none');

                let regularPacks = 0;
                let rarePacks = 0;
                const results = new Array(RARITIES.length).fill(0);
                
                for (let pack = 0; pack < packCount; pack++) {
                    const isRarePack = Math.random() > PACK_RATES[0];
                    isRarePack ? rarePacks++ : regularPacks++;
                    
                    const packResults = simulatePackOpening(packType, isRarePack);
                    for (let i = 0; i < results.length; i++) {
                        results[i] += packResults[i];
                    }
                }

                $('#packResults').html(`
                    <div class="result-item d-flex justify-content-between">
                        <span>Regular Packs:</span>
                        <span>${regularPacks}</span>
                    </div>
                    <div class="result-item d-flex justify-content-between">
                        <span>Rare Packs:</span>
                        <span>${rarePacks}</span>
                    </div>
                `);

                let totalCards = 0;
                const rarityHtml = results.map((count, index) => {
                    if (count > 0) {
                        totalCards += count;
                        return `
                            <div class="result-item d-flex justify-content-between">
                                <span>Rarity ${RARITIES[index]}:</span>
                                <span>${count} cards</span>
                            </div>
                        `;
                    }
                    return '';
                }).join('');

                $('#rarityResults').html(rarityHtml);
                $('#totalCards').text(`Total Cards: ${totalCards}`);
            });

            // Collection Simulator
            $('#simulateCollectionBtn').on('click', function() {
                const packType = $('#collectionPackType').val();
                const $chartContainer = $('#chartContainer');
                const $progressBar = $('.progress-bar');
                
                // Show loading state
                $chartContainer.addClass('loading');
                $chartContainer.attr('data-progress', 'Simulating... 0%');
                $progressBar.css('width', '0%').attr('aria-valuenow', 0);
                
                // Use setTimeout to allow the UI to update before starting the simulation
                setTimeout(() => {
                    const results = [];
                    const totalTrials = 10000;
                    const batchSize = 50; // Process in smaller batches to update UI
                    let processed = 0;

                    function processBatch() {
                        for (let i = 0; i < batchSize && processed < totalTrials; i++) {
                            results.push(simulateCollection(packType));
                            processed++;
                        }

                        // Update progress
                        const progress = Math.round((processed / totalTrials) * 100);
                        $chartContainer.attr('data-progress', `Simulating... ${progress}%`);
                        $progressBar.css('width', `${progress}%`).attr('aria-valuenow', progress);

                        if (processed < totalTrials) {
                            // Process next batch
                            setTimeout(processBatch, 0);
                        } else {
                            // Simulation complete
                            // Calculate statistics
                            const avg = Math.round(results.reduce((a, b) => a + b) / results.length);
                            const min = Math.min(...results);
                            const max = Math.max(...results);

                            // Update statistics
                            $('#avgPacks').text(avg);
                            $('#minPacks').text(min);
                            $('#maxPacks').text(max);

                            // Remove loading state and update chart
                            $chartContainer.removeClass('loading');
                            updateChart(results);
                        }
                    }

                    // Start processing batches
                    processBatch();
                }, 50);
            });
        });
    </script>
</body>
</html>
